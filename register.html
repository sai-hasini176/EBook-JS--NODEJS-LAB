<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Header -->
<header class="top-header d-flex justify-content-between align-items-center p-3 border-bottom">
    <div class="fw-bold">BVRITH E-BOOK SYSTEM</div>
    <div class="small">Welcome, Hasini | Roll No: 24WH1A0576</div>
</header>

<div class="container-fluid">
  <div class="row min-vh-100">

    <!-- Sidebar -->
    <aside class="col-12 col-md-3 col-lg-2 border-end p-3">
      <nav class="nav flex-column">
        <a href="register.html" class="nav-link active">Registration</a>
        <a href="login.html" class="nav-link">Login</a>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="col-12 col-md-9 d-flex justify-content-center align-items-center p-4">
      <div class="card p-3" style="max-width: 500px; width: 100%;">
        
        <h2 class="text-center">Create Account</h2>
        <div id="messageBox"></div>

        <form onsubmit="return validateRegister()">

  <div class="row g-2">

    <!-- Name -->
    <div class="col-12">
      <label class="form-label small mb-1">Full Name</label>
      <input type="text" id="name" class="form-control form-control-sm">
    </div>

    <!-- Email + Password side by side -->
    <div class="col-6">
      <label class="form-label small mb-1">Email</label>
      <input type="email" id="email" class="form-control form-control-sm">
    </div>

    <div class="col-6">
      <label class="form-label small mb-1">Password</label>
      <input type="password" id="password" class="form-control form-control-sm">
    </div>

    <!-- Confirm + Department -->
    <div class="col-6">
      <label class="form-label small mb-1">Confirm</label>
      <input type="password" id="confirmPassword" class="form-control form-control-sm">
    </div>

    <div class="col-6">
      <label class="form-label small mb-1">Dept</label>
      <select class="form-select form-select-sm">
        <option>CSE</option>
        <option>AIML</option>
        <option>ECE</option>
        <option>EEE</option>
        <option>IT</option>
      </select>
    </div>

    <!-- Gender + Address -->
    <div class="col-6">
      <label class="form-label small mb-1">Gender</label>
      <div class="d-flex gap-2 small">
        <div class="form-check">
          <input class="form-check-input" type="radio" name="gender">
          <label class="form-check-label">Male</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="gender">
          <label class="form-check-label">Female</label>
        </div>
      </div>
    </div>

    <div class="col-6">
  <label class="form-label small mb-1">Address</label>
  <textarea class="form-control form-control-sm" rows="2"></textarea>
</div>

    <!-- Login link -->
    <div class="col-12 text-center small">
      Already have an account? 
      <a href="login.html">Login</a>
    </div>

    <!-- Buttons -->
    <div class="col-12 d-flex gap-2">
      <button type="submit" class="btn btn-primary btn-sm w-50">Submit</button>
      <button type="reset" class="btn btn-outline-secondary btn-sm w-50">Clear</button>
    </div>

  </div>

</form>

      </div>

    </main>
  </div>
</div>

<!-- Footer -->
<footer class="text-center py-3 border-top">
    2026 BVRITH. All rights reserved.
</footer>

<script src="validation.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
