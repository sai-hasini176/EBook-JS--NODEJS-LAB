<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Header -->
<header class="top-header d-flex justify-content-between align-items-center p-3 border-bottom">
    <div class="fw-bold">BVRITH E-BOOK SYSTEM</div>
    <div class="small">Welcome, Hasini | Roll No.: 24WH1A0576</div>
</header>

<div class="container-fluid">
    <div class="row min-vh-100">

        <!-- Sidebar -->
        <aside class="col-12 col-md-3 col-lg-2 border-end p-3">
            <nav class="nav flex-column">
                <a href="catalog.html" class="nav-link">Catalog</a>
                <a href="cart.html" class="nav-link active">Cart</a>
                <a href="logout.html" class="nav-link">Logout</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="col-12 col-md-9 col-lg-10 p-4">

            <div class="card shadow-sm p-4 mx-auto" style="max-width: 700px;">

                <h2 class="text-center mb-3">Shopping Cart</h2>
                <div id="messageBox"></div>

                <div class="table-responsive mt-3">
                    <table class="table table-bordered text-center align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Product</th>
                                <th>Qty</th>
                                <th>Price</th>
                                <th>Total</th>
                                <th>Remove</th>
                            </tr>
                        </thead>
                        <tbody id="cartItems"></tbody>
                    </table>
                </div>

                <h4 class="text-end mt-3">
                    Total: Rs. <span id="billTotal">0</span>
                </h4>

                <div class="text-end mt-3">
                    <a href="#bill" class="btn btn-success"
                        onclick="loadBill()">Proceed to Checkout</a>
                </div>

            </div>

        </main>

    </div>
</div>

<!-- Bill Popup -->
<div id="bill" class="bill-overlay">

    <form onsubmit="return validateCart()">

        <div class="card p-4 shadow mx-auto" style="max-width: 600px; margin-top: 50px;">

            <h3 class="text-center mb-3">Purchase Bill</h3>

            <div class="table-responsive">
                <table class="table table-bordered text-center">
                    <thead class="table-light">
                        <tr>
                            <th>Product</th>
                            <th>Qty</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="billItems"></tbody>
                </table>
            </div>

            <h5 class="text-end mt-3">
                Total: Rs. <span id="totalAmount">0</span>
            </h5>

            <!-- Payment -->
            <div class="mt-3">
                <label class="form-label">Payment Method</label>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="payment" value="card" id="card">
                    <label class="form-check-label" for="card">Card</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="payment" value="upi" id="upi">
                    <label class="form-check-label" for="upi">UPI</label>
                </div>
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-end gap-2 mt-4">
                <button type="submit" class="btn btn-primary">Place Order</button>
                <a href="#" class="btn btn-secondary">Close</a>
            </div>

        </div>

    </form>

</div>

<footer class="text-center py-3 border-top">
    2026 BVRITH
</footer>

<script src="validation.js"></script>

<script>
    loadCart();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
