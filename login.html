<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Header -->
<header class="top-header d-flex justify-content-between align-items-center p-3 border-bottom">
    <div class="fw-bold">BVRITH E-BOOK SYSTEM</div>
    <div class="small">Welcome, Hasini | Roll No: 24WH1A0576</div>
</header>

<div class="container-fluid">
    <div class="row min-vh-100">

        <!-- Sidebar -->
        <aside class="col-12 col-md-3 col-lg-2 border-end p-3">
            <nav class="nav flex-column">
                <a href="register.html" class="nav-link">Register</a>
                <a href="login.html" class="nav-link active">Login</a>
            </nav>
        </aside>

        <!-- Main content -->
        <main class="col-12 col-md-9 col-lg-10 d-flex justify-content-center align-items-center p-4">

            <div class="card shadow-sm p-4 w-100" style="max-width: 400px;">

                <h2 class="text-center mb-3">Login</h2>
                <div id="messageBox"></div>

                <form onsubmit="return validateLogin()">

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="loginEmail" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="loginPassword" class="form-control">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Login</button>

                </form>

                <div class="text-center mt-3">
                    Don't have an account?
                    <a href="register.html">Register</a>
                </div>

            </div>

        </main>

    </div>
</div>

<footer class="text-center py-3 border-top">
    2026 BVRITH
</footer>

<script src="validation.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
