<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- Header -->
<header class="top-header d-flex justify-content-between align-items-center p-3 border-bottom">
    <div class="fw-bold">BVRITH E-BOOK SYSTEM</div>
    <div class="small">Welcome, Hasini | Roll No.: 24WH1A0576</div>
</header>

<div class="container-fluid">
    <div class="row min-vh-100">

        <!-- Sidebar -->
        <aside class="col-12 col-md-3 col-lg-2 border-end p-3">
            <nav class="nav flex-column">
                <a href="catalog.html" class="nav-link active">Catalog</a>
                <a href="cart.html" class="nav-link">Cart</a>
                <a href="logout.html" class="nav-link">Logout</a>
            </nav>
        </aside>

        <!-- Main content -->
        <main class="col-12 col-md-9 col-lg-10 p-4">

            <h2 class="text-center mb-4">Product Catalog</h2>
            <div id="messageBox"></div>

            <div class="row g-4">

                <!-- Book 1 -->
                <div class="col-12 col-sm-6 col-md-4">
                    <div class="card h-100 text-center p-3 shadow-sm">

                        <img src="images/book1.jpg" class="card-img-top mb-2">

                        <h5>Java Programming</h5>
                        <p>Rs. 150</p>

                        <div id="controls-java" class="mt-auto">
                            <button class="btn btn-primary w-100"
                                onclick="addFirstItem('java', 'Java Programming', 150)">
                                Add to Cart
                            </button>
                        </div>

                    </div>
                </div>

                <!-- Book 2 -->
                <div class="col-12 col-sm-6 col-md-4">
                    <div class="card h-100 text-center p-3 shadow-sm">

                        <img src="images/book2.jpg" class="card-img-top mb-2">

                        <h5>Data Structures</h5>
                        <p>Rs. 300</p>

                        <div id="controls-ds" class="mt-auto">
                            <button class="btn btn-primary w-100"
                                onclick="addFirstItem('ds', 'Data Structures', 300)">
                                Add to Cart
                            </button>
                        </div>

                    </div>
                </div>

                <!-- Book 3 -->
                <div class="col-12 col-sm-6 col-md-4">
                    <div class="card h-100 text-center p-3 shadow-sm">

                        <img src="images/book3.jpg" class="card-img-top mb-2">

                        <h5>Fluid Mechanics</h5>
                        <p>Rs. 250</p>

                        <div id="controls-fluid" class="mt-auto">
                            <button class="btn btn-primary w-100"
                                onclick="addFirstItem('fluid', 'Fluid Mechanics', 250)">
                                Add to Cart
                            </button>
                        </div>

                    </div>
                </div>

            </div>

        </main>
    </div>
</div>

<footer class="text-center py-3 border-top">
    2026 BVRITH
</footer>

<script src="validation.js"></script>

<script>
window.onload = function () {
    localStorage.removeItem("cart"); // ensures fresh state
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
